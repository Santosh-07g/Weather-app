<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Professional Weather App</title>
    <meta name="description" content="A professional, modern weather application with real-time data and 5-day forecast.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-light">
    <div id="loader" class="loader-wrapper">
        <div class="loader"></div>
    </div>

    <div class="background-overlay" id="bg-overlay"></div>

    <main class="app-container">
        <!-- Header / Search Section -->
        <header class="app-header">
            <div class="logo">
                <i class="fas fa-wind logo-icon"></i>
                <h1>SkyCast</h1>
            </div>
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="city-input" placeholder="Search city..." autocomplete="off">
                    <button id="search-btn" class="btn-primary">Search</button>
                    <button id="geo-btn" class="btn-secondary" title="Use current location">
                        <i class="fas fa-location-crosshairs"></i>
                    </button>
                </div>
            </div>
            <div class="controls">
                <button id="theme-toggle" class="theme-toggle" title="Toggle Dark/Light Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Error Message Overlay -->
        <div id="error-message" class="error-container hidden">
            <i class="fas fa-circle-exclamation"></i>
            <span id="error-text">City not found. Please try again.</span>
        </div>

        <section class="weather-content" id="weather-content">
            <!-- Main Weather Card -->
            <div class="main-card glass">
                <div class="current-info">
                    <div class="location-group">
                        <h2 id="city-name" class="city-name">London, GB</h2>
                        <p id="current-date" class="current-date">Saturday, 14 March 2026</p>
                    </div>
                    <div class="temp-group">
                        <div class="main-temp-wrapper">
                            <span id="current-temp" class="current-temp">24°</span>
                        </div>
                        <div class="condition-wrapper">
                            <i id="weather-icon" class="fas fa-cloud-sun weather-icon-large"></i>
                            <span id="weather-condition" class="weather-condition">Partly Cloudy</span>
                        </div>
                    </div>
                    <div class="range-group">
                        <span>H: <span id="temp-max">26°</span></span>
                        <span>L: <span id="temp-min">18°</span></span>
                        <span class="feels-like">Feels like: <span id="feels-like">25°</span></span>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <i class="fas fa-droplet"></i>
                        <div class="stat-info">
                            <span class="stat-label">Humidity</span>
                            <span id="humidity" class="stat-value">64%</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-wind"></i>
                        <div class="stat-info">
                            <span class="stat-label">Wind</span>
                            <span id="wind-speed" class="stat-value">12 km/h</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-gauge-high"></i>
                        <div class="stat-info">
                            <span class="stat-label">Pressure</span>
                            <span id="pressure" class="stat-value">1012 hPa</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-sun"></i>
                        <div class="stat-info">
                            <span class="stat-label">Sunrise</span>
                            <span id="sunrise" class="stat-value">06:12 AM</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-moon"></i>
                        <div class="stat-info">
                            <span class="stat-label">Sunset</span>
                            <span id="sunset" class="stat-value">06:45 PM</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Forecast Section -->
            <section class="forecast-section">
                <h3 class="section-title">5-Day Forecast</h3>
                <div class="forecast-container" id="forecast-container">
                    <!-- Forecast items will be injected here -->
                    <!-- Sample Card -->
                    <div class="forecast-card glass">
                        <span class="f-day">Sun</span>
                        <i class="fas fa-sun f-icon"></i>
                        <span class="f-temp">28°</span>
                        <span class="f-condition">Sunny</span>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
